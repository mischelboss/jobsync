description: Resume review prompt regression tests

providers:
  - id: openai:chat:deepseek-v4-flash
    config:
      apiBaseUrl: https://api.deepseek.com
      apiKeyEnvar: DEEPSEEK_API_KEY
      showThinking: false
      temperature: 0
      max_tokens: 8192

prompts:
  - file://./prompt.ts

tests:
  - description: Strong senior engineer resume - structural + score validation
    vars:
      resumeText: file://./fixtures/strong-senior.txt
    assert:
      - type: javascript
        value: file://./assertions.ts:assertNotJson
      - type: javascript
        value: file://./assertions.ts:assertScoresLine
      - type: javascript
        value: file://./assertions.ts:assertScoresFirstLine
      - type: javascript
        value: file://./assertions.ts:assertMarkdownBodyNonEmpty
      - type: javascript
        value: file://./assertions.ts:assertRequiredSections
      - type: javascript
        value: file://./assertions.ts:assertStrongScoresHigh

  - description: Weak/sparse resume - structural + score + content validation
    vars:
      resumeText: file://./fixtures/weak-sparse.txt
    assert:
      - type: javascript
        value: file://./assertions.ts:assertNotJson
      - type: javascript
        value: file://./assertions.ts:assertScoresLine
      - type: javascript
        value: file://./assertions.ts:assertScoresFirstLine
      - type: javascript
        value: file://./assertions.ts:assertMarkdownBodyNonEmpty
      - type: javascript
        value: file://./assertions.ts:assertRequiredSections
      - type: javascript
        value: file://./assertions.ts:assertWeakScoresLow
      # Review must reference the fixture's weak phrasing, not paraphrase it away.
      - type: icontains-any
        value:
          - "Responsible for"
          - "Helped with"
